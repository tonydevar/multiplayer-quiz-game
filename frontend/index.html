<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Multiplayer Quiz Game</title>
    <style>
      /* ── Reset + Base ─────────────────────────────────────────────── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
        scroll-behavior: smooth;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;
        min-height: 100dvh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }

      /* ── Typography ───────────────────────────────────────────────── */
      h1, h2, h3 {
        line-height: 1.2;
      }

      p {
        line-height: 1.6;
      }

      /* ── Interactive elements ─────────────────────────────────────── */
      button {
        font-family: inherit;
        /* Minimum touch target */
        min-height: 44px;
        min-width: 44px;
      }

      input {
        font-family: inherit;
        min-height: 44px;
      }

      /* ── Focus visible ────────────────────────────────────────────── */
      :focus-visible {
        outline: 2px solid #38bdf8;
        outline-offset: 3px;
        border-radius: 4px;
      }

      /* ── Scrollbar ────────────────────────────────────────────────── */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 3px;
      }

      /* ── Animations ───────────────────────────────────────────────── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.6; }
      }

      /* ── Responsive helpers ───────────────────────────────────────── */
      /* Cards are fluid but won't exceed their max-width */
      .card {
        width: 100%;
        padding: 1.5rem;
        animation: fadeIn 0.25s ease;
      }

      @media (min-width: 480px) {
        .card {
          padding: 2rem;
        }
      }

      /* ── Countdown timer on small screens ────────────────────────── */
      @media (max-width: 375px) {
        /* Tighten game page padding */
        #root > div {
          padding-left: 0.75rem;
          padding-right: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
